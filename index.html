<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fare Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0F1626; --panel:#161F33; --panel2:#1C2740; --line:#243049;
    --amber:#FFB84D; --ink:#E9EEF6; --muted:#8B97AD;
    --good:#5CE0A1; --bad:#F08A8A;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--night);color:var(--ink);font-family:Inter,system-ui,sans-serif;
       padding:32px 20px 64px;max-width:1000px;margin:0 auto}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.22em;
           color:var(--muted);text-transform:uppercase}
  h1{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:clamp(26px,4vw,38px);
     color:var(--amber);letter-spacing:.04em;margin:6px 0 4px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:20px;line-height:1.5}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
  .btn{display:inline-block;background:var(--amber);color:var(--night);font-weight:600;
       text-decoration:none;padding:9px 16px;border-radius:6px;font-size:14px;border:none;cursor:pointer}
  .btn:hover{opacity:.9}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .btn-ghost:hover{border-color:var(--amber);color:var(--amber)}
  .btn-sm{padding:5px 10px;font-size:12.5px}
  .btn-link{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12.5px;padding:2px 4px}
  .btn-link:hover{color:var(--bad)}
  .spacer{flex:1}
  .err{color:var(--bad);font-size:13px;margin:6px 0}
  .msg{color:var(--good);font-size:13px;margin:6px 0}

  /* Auth */
  .auth-wrap{max-width:380px;margin:60px auto;background:var(--panel);border:1px solid var(--line);
      border-radius:10px;padding:28px}
  .auth-wrap h2{font-family:'IBM Plex Mono',monospace;font-size:20px;margin-bottom:16px;color:var(--amber)}
  .auth-wrap label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;
      letter-spacing:.06em;margin:12px 0 4px;font-family:'IBM Plex Mono',monospace}
  .auth-wrap input{width:100%}
  .auth-switch{margin-top:16px;font-size:13px;color:var(--muted)}
  .auth-switch button{background:none;border:none;color:var(--amber);cursor:pointer;font-size:13px;
      text-decoration:underline;padding:0}

  /* Tabs */
  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:20px}
  .tab{background:transparent;border:none;color:var(--muted);padding:10px 16px;font-size:14px;
      font-family:'IBM Plex Mono',monospace;cursor:pointer;border-bottom:2px solid transparent}
  .tab.active{color:var(--amber);border-bottom-color:var(--amber)}
  .tab:hover{color:var(--ink)}
  .tab-new{color:var(--muted);font-size:18px;padding:10px 14px}
  .tab-new-folder{color:var(--muted);font-size:13px;padding:10px 14px;white-space:nowrap}
  .tab-folder{display:flex;align-items:center;gap:2px;border:1px dashed var(--line);
      border-bottom:none;border-radius:8px 8px 0 0;padding:2px 4px 0;margin-bottom:-1px}
  .tab-folder.drag-over{border-color:var(--amber)}
  .tab-folder-label{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);
      padding:6px 4px 6px 6px;cursor:grab;user-select:none;white-space:nowrap}
  .tab-folder-label:hover{color:var(--amber)}
  .tab-folder-del{color:var(--muted);cursor:pointer;font-size:13px;padding:0 8px 0 2px}
  .tab-folder-del:hover{color:var(--bad)}
  .tab-folder-tabs{display:flex;gap:2px;flex-wrap:wrap}
  .tab-ungrouped{display:flex;gap:2px;flex-wrap:wrap}
  .tab-ungrouped.drag-over{outline:1px dashed var(--amber);border-radius:6px}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px}
  .panel-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .panel-head h2{font-family:'IBM Plex Mono',monospace;font-size:20px;flex:1;min-width:120px}
  .title-input{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;
      background:var(--night);border:1px solid var(--amber);color:var(--ink);
      padding:4px 8px;border-radius:6px;flex:1;min-width:120px}

  .totals{font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--amber);
      background:var(--night);border:1px solid var(--line);border-radius:8px;
      padding:10px 14px;margin:12px 0 16px}

  .stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;
      padding:10px 16px;min-width:120px}
  .stat-label{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
      color:var(--muted);margin-bottom:3px}
  .stat-val{font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--ink)}
  .stat.stat-total .stat-val{color:var(--amber)}

  .meta-block{background:var(--night);border:1px solid var(--line);border-radius:8px;
      padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--muted)}
  .meta-block b{color:var(--ink)}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .tag{background:var(--panel2);border:1px solid var(--line);border-radius:12px;
      padding:2px 10px;font-size:12px}

  .share-block{margin-bottom:16px}
  .collab-list{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
  .collab-chip{background:var(--panel2);border:1px solid var(--line);border-radius:12px;
      padding:3px 6px 3px 10px;font-size:12.5px;display:flex;align-items:center;gap:6px}

  .pair-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .leg-tag{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
           margin-bottom:6px;font-family:'IBM Plex Mono',monospace}
  .leg-col{min-height:20px}
  .solo-list{display:flex;flex-direction:column;gap:14px}
  @media (max-width:640px){ .pair-row{grid-template-columns:1fr} }

  .card{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:14px 16px}
  .card.drag-over{border-color:var(--amber)}
  .card h3{font-size:15px;font-weight:600;margin-bottom:4px}
  .drag-handle{cursor:grab;color:var(--muted);font-size:13px;margin-right:6px;user-select:none}
  .card-title-row{display:flex;align-items:center}
  .meta-line{font-size:12.5px;color:var(--muted);margin-bottom:8px;font-family:'IBM Plex Mono',monospace;line-height:1.6}
  .meta-line b{color:var(--ink);font-weight:600}
  .notes{font-size:12.5px;color:var(--muted);font-style:italic;margin-bottom:10px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}

  .log-form{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;align-items:center}

  .attachments-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0}
  .att-thumb{position:relative;width:56px;height:56px;border-radius:6px;overflow:hidden;
      border:1px solid var(--line);cursor:pointer;background:var(--night)}
  .att-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .att-thumb .att-del{position:absolute;top:0;right:0;background:rgba(15,22,38,.85);color:var(--ink);
      border:none;font-size:11px;padding:1px 5px;cursor:pointer;border-radius:0 0 0 6px}
  .att-thumb .att-del:hover{color:var(--bad)}
  .att-thumb .att-text-btn{position:absolute;bottom:0;left:0;background:rgba(15,22,38,.85);color:var(--ink);
      border:none;font-size:11px;line-height:1;padding:2px 4px;cursor:pointer;border-radius:0 6px 0 0}
  .att-thumb .att-text-btn:hover{color:var(--amber)}
  .att-add-btn{display:flex;align-items:center;justify-content:center;width:56px;height:56px;
      border:1px dashed var(--line);border-radius:6px;cursor:pointer;color:var(--muted);font-size:20px}
  .att-add-btn:hover{border-color:var(--amber);color:var(--amber)}
  .att-status{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
  .att-suggest{background:var(--night);border:1px solid var(--amber);border-radius:6px;
      padding:8px 10px;font-size:12.5px;margin:6px 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .att-suggest b{color:var(--amber)}
  .att-text-box{background:var(--night);border:1px solid var(--line);border-radius:6px;padding:8px 10px;
      font-size:11.5px;font-family:'IBM Plex Mono',monospace;color:var(--muted);white-space:pre-wrap;
      max-height:140px;overflow-y:auto;margin:6px 0}

  .daterange-btn{font-size:11.5px}
  .daterange-popover{position:absolute;z-index:50;background:var(--panel);border:1px solid var(--line);
      border-radius:8px;padding:10px;box-shadow:0 8px 24px rgba(0,0,0,.4);width:220px;
      font-family:'IBM Plex Mono',monospace}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;margin-bottom:8px}
  .cal-nav .btn-link{font-size:14px;padding:0 6px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
  .cal-dow{color:var(--muted);font-size:10px;margin-bottom:2px}
  .cal-day{background:transparent;border:none;color:var(--ink);font-size:12px;padding:5px 0;
      border-radius:4px;cursor:pointer;font-family:'IBM Plex Mono',monospace}
  .cal-day:hover{background:var(--panel2)}
  .cal-day.cal-empty{cursor:default}
  .cal-day.cal-empty:hover{background:transparent}
  .cal-day.in-range{background:var(--panel2)}
  .cal-day.range-start,.cal-day.range-end{background:var(--amber);color:var(--night);font-weight:600}
  .cal-actions{text-align:right;margin-top:6px}
  input,select,textarea{background:var(--night);border:1px solid var(--line);
       color:var(--ink);padding:7px 9px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:13px}
  input[type=number]{width:100px}
  textarea{width:100%;font-family:Inter,sans-serif;font-size:13px;resize:vertical;min-height:50px}
  label.field{display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--muted);
      letter-spacing:.05em;text-transform:uppercase;font-family:'IBM Plex Mono',monospace}
  .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;
      background:var(--night);border:1px solid var(--line);border-radius:8px;padding:12px}
  .edit-grid .span2{grid-column:1 / -1}
  @media (max-width:520px){ .edit-grid{grid-template-columns:1fr} }

  table.hist{width:100%;border-collapse:collapse;margin-top:10px;font-family:'IBM Plex Mono',monospace;font-size:12.5px}
  table.hist th{text-align:left;color:var(--muted);font-weight:500;font-size:10.5px;
       letter-spacing:.1em;text-transform:uppercase;padding:5px 6px;border-bottom:1px solid var(--line)}
  table.hist td{padding:5px 6px;border-bottom:1px solid var(--line)}
  table.hist tr:last-child td{border-bottom:none}
  .status{font-size:10.5px;letter-spacing:.1em;padding:2px 7px;border-radius:4px;
          border:1px solid var(--line);color:var(--muted);white-space:nowrap}
  .status-alert{color:var(--night);background:var(--good);border-color:var(--good);font-weight:600}
  .status-warn{color:var(--night);background:var(--amber);border-color:var(--amber);font-weight:600}
  .section-head{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
      font-family:'IBM Plex Mono',monospace;margin:22px 0 10px;display:flex;align-items:center;gap:10px}
  .section-head::after{content:"";flex:1;border-top:1px solid var(--line)}
  .up{color:var(--bad)} .down{color:var(--good)} .flat{color:var(--muted)}
  .empty-hist{color:var(--muted);font-size:12.5px;margin-top:8px}
  .empty-state{background:var(--panel);border:1px dashed var(--line);border-radius:10px;
      padding:28px 20px;text-align:center;color:var(--muted)}
  .new-form{display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
</style>
</head>
<body>
  <p class="eyebrow">Fare board</p>
  <h1>FLIGHT PRICES</h1>
  <p class="sub" id="subtext">Loading…</p>

  <div id="root"></div>

<script type="module">
// jsDelivr primary, esm.sh fallback — some networks/CDN edges fail one or the other.
let createClient;
try {
  ({ createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'));
} catch {
  ({ createClient } = await import('https://esm.sh/@supabase/supabase-js@2'));
}

// These are intentionally public (standard Supabase client pattern) —
// Row Level Security is what actually protects the data.
const SUPABASE_URL = "https://mmqcbjgftpwzaughimkr.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_OU7_hsa5kefA2SDizMneeg_RjqASdUZ";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const root = document.getElementById("root");
const uid = () => crypto.randomUUID();

const OLD_LOCAL_KEY = "flight-tracker-dashboard-v1";
const MIGRATED_FLAG = "flight-tracker-migrated";

let session = null;
let trips = [];
let folders = [];
let activeTripId = null;
let statsFilter = "all"; // "all" | "ungrouped" | a folder id
let authMode = "login"; // login | signup | forgot | reset
let authError = "", authMsg = "";

const fmtCash = (n, cur="USD") =>
  new Intl.NumberFormat("en-US",{style:"currency",currency:cur}).format(n);
const fmtPoints = n => `${Number(n).toLocaleString()} pts`;
const esc = s => (s ?? "").toString().replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function paidText(f){
  const parts = [];
  if (f.paid_cash != null) parts.push(fmtCash(f.paid_cash, f.currency));
  if (f.paid_points != null) parts.push(fmtPoints(f.paid_points));
  return parts.length ? parts.join(" + ") : "—";
}

// Per-ticket price × passenger count, e.g. "$300.00 + 22,000 pts"
function flightTotalText(f){
  const n = f.passengers || 1;
  const parts = [];
  if (f.paid_cash != null) parts.push(fmtCash(f.paid_cash * n, f.currency));
  if (f.paid_points != null) parts.push(fmtPoints(f.paid_points * n));
  return parts.length ? parts.join(" + ") : "—";
}

// Outbound/return are paired lanes; standalone and round-trip flights share
// the single "solo" lane since they render in the same list.
const legScope = (leg) => (leg === "outbound" || leg === "return") ? leg : "solo";

function findFlight(flightId){
  for (const t of trips) {
    const f = (t.flights || []).find(fl => fl.id === flightId);
    if (f) return { trip: t, flight: f };
  }
  return null;
}

function findRental(rentalId){
  for (const t of trips) {
    const r = (t.rentals || []).find(x => x.id === rentalId);
    if (r) return { trip: t, rental: r };
  }
  return null;
}

// "2026-12-04" -> "Dec 4" (parsed as a plain date, no timezone shifting)
function fmtShortDate(iso){
  if (!iso) return "";
  const [y, m, d] = iso.split("-").map(Number);
  if (!y || !m || !d) return iso;
  return new Date(y, m - 1, d).toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

// "22:00" -> "10:00 PM"
function fmtTime(t){
  if (!t) return "";
  const [h, m] = t.split(":").map(Number);
  const ampm = h >= 12 ? "PM" : "AM";
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,"0")} ${ampm}`;
}

// Auto-generated flight title: "Dec 4 10:00 PM, BWI → DEN, 22,000 pts"
// (date/time, depart airport → arrival airport, points or cash paid)
// Round trip: "Dec 4 → Dec 8, BWI ⇄ DEN, 22,000 pts"
function flightTitle(origin, destination, departDate, departTime, paidCash, paidPoints, leg, returnDate){
  if (!origin || !destination) return "";
  const parts = [];
  if (leg === "roundtrip" && returnDate){
    parts.push(`${fmtShortDate(departDate)} → ${fmtShortDate(returnDate)}`);
    parts.push(`${origin.toUpperCase()} ⇄ ${destination.toUpperCase()}`);
  } else {
    const when = [fmtShortDate(departDate), fmtTime(departTime)].filter(Boolean).join(" ");
    if (when) parts.push(when);
    parts.push(`${origin.toUpperCase()} → ${destination.toUpperCase()}`);
  }
  if (paidPoints != null && paidPoints !== "" && !isNaN(paidPoints)) parts.push(fmtPoints(paidPoints));
  else if (paidCash != null && paidCash !== "" && !isNaN(paidCash)) parts.push(fmtCash(paidCash));
  return parts.join(", ");
}

// Pull airports + date out of a pasted flight-search URL where possible.
// Southwest puts them right in the query string; Kayak uses /flights/BWI-DEN/2026-12-04.
function parseFlightUrl(url){
  try {
    const u = new URL(url);
    const q = u.searchParams;
    const sw = {
      origin: q.get("originationAirportCode"),
      destination: q.get("destinationAirportCode"),
      departDate: q.get("departureDate"),
    };
    if (sw.origin && sw.destination) return sw;
    const kayak = u.pathname.match(/\/flights\/([A-Z]{3})-([A-Z]{3})\/(\d{4}-\d{2}-\d{2})/i);
    if (kayak) return { origin: kayak[1].toUpperCase(), destination: kayak[2].toUpperCase(), departDate: kayak[3] };
  } catch {}
  return null;
}

// ---------------- Date range picker ----------------
// A small calendar popover so a start/end date pair (trip dates, rental
// dates, round-trip depart/return) can be picked in two clicks on one
// calendar, instead of juggling two separate native date inputs.

function fmtISO(year, month, day){ // month is 0-indexed
  return `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}

function parseISODate(iso){
  if (!iso) return null;
  const [y,m,d] = iso.split("-").map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m-1, d);
}

let activeDateRangePopover = null;
let dateRangeDocListener = null;

function closeDateRangePopover(){
  if (activeDateRangePopover){ activeDateRangePopover.remove(); activeDateRangePopover = null; }
  if (dateRangeDocListener){ document.removeEventListener("click", dateRangeDocListener, true); dateRangeDocListener = null; }
}

function renderCalMonth(year, month, rangeStart, rangeEnd){
  const first = new Date(year, month, 1);
  const startWeekday = first.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthLabel = first.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  let cells = "";
  for (let i = 0; i < startWeekday; i++) cells += `<span class="cal-day cal-empty"></span>`;
  for (let d = 1; d <= daysInMonth; d++){
    const cur = new Date(year, month, d);
    let cls = "cal-day";
    if (rangeStart && cur.getTime() === rangeStart.getTime()) cls += " range-start";
    if (rangeEnd && cur.getTime() === rangeEnd.getTime()) cls += " range-end";
    if (rangeStart && rangeEnd && cur > rangeStart && cur < rangeEnd) cls += " in-range";
    cells += `<button type="button" class="${cls}" data-cal-day="${fmtISO(year, month, d)}">${d}</button>`;
  }
  return `
    <div class="cal-nav">
      <button type="button" class="btn-link" data-cal-prev>‹</button>
      <span>${monthLabel}</span>
      <button type="button" class="btn-link" data-cal-next>›</button>
    </div>
    <div class="cal-grid cal-dow">
      <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
    </div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-actions"><button type="button" class="btn-link" data-cal-clear>clear</button></div>`;
}

function openDateRangePicker(anchorBtn, startInput, endInput){
  closeDateRangePopover();
  let rangeStart = parseISODate(startInput.value);
  let rangeEnd = parseISODate(endInput.value);
  const initial = rangeStart || new Date();
  let viewYear = initial.getFullYear(), viewMonth = initial.getMonth();

  const pop = document.createElement("div");
  pop.className = "daterange-popover";
  document.body.appendChild(pop);
  activeDateRangePopover = pop;

  const position = () => {
    const r = anchorBtn.getBoundingClientRect();
    pop.style.top = `${r.bottom + window.scrollY + 4}px`;
    pop.style.left = `${r.left + window.scrollX}px`;
  };

  const setValues = () => {
    startInput.value = rangeStart ? fmtISO(rangeStart.getFullYear(), rangeStart.getMonth(), rangeStart.getDate()) : "";
    endInput.value = rangeEnd ? fmtISO(rangeEnd.getFullYear(), rangeEnd.getMonth(), rangeEnd.getDate()) : "";
    startInput.dispatchEvent(new Event("input", { bubbles: true }));
    endInput.dispatchEvent(new Event("input", { bubbles: true }));
  };

  const redraw = () => {
    pop.innerHTML = renderCalMonth(viewYear, viewMonth, rangeStart, rangeEnd);
    position();
    pop.querySelector("[data-cal-prev]").addEventListener("click", () => {
      viewMonth--; if (viewMonth < 0){ viewMonth = 11; viewYear--; }
      redraw();
    });
    pop.querySelector("[data-cal-next]").addEventListener("click", () => {
      viewMonth++; if (viewMonth > 11){ viewMonth = 0; viewYear++; }
      redraw();
    });
    pop.querySelector("[data-cal-clear]").addEventListener("click", () => {
      rangeStart = null; rangeEnd = null;
      setValues();
      redraw();
    });
    pop.querySelectorAll("[data-cal-day]").forEach(cell => {
      cell.addEventListener("click", () => {
        const clicked = parseISODate(cell.dataset.calDay);
        if (!rangeStart || rangeEnd){
          rangeStart = clicked; rangeEnd = null;
        } else if (clicked < rangeStart){
          rangeEnd = rangeStart; rangeStart = clicked;
        } else {
          rangeEnd = clicked;
        }
        setValues();
        if (rangeStart && rangeEnd){ closeDateRangePopover(); return; }
        redraw();
      });
    });
  };
  redraw();

  dateRangeDocListener = (e) => {
    if (!pop.contains(e.target) && e.target !== anchorBtn) closeDateRangePopover();
  };
  setTimeout(() => document.addEventListener("click", dateRangeDocListener, true), 0);
}

// ---------------- Screenshot OCR (client-side, best-effort) ----------------

let tesseractLoadPromise = null;
function loadTesseract(){
  if (window.Tesseract) return Promise.resolve(window.Tesseract);
  if (!tesseractLoadPromise){
    tesseractLoadPromise = new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
      s.onload = () => resolve(window.Tesseract);
      s.onerror = () => reject(new Error("Couldn't load the OCR library (offline?)."));
      document.head.appendChild(s);
    });
  }
  return tesseractLoadPromise;
}

async function runOcr(file, onProgress){
  const Tesseract = await loadTesseract();
  const { data } = await Tesseract.recognize(file, "eng", {
    logger: onProgress ? (m) => onProgress(m) : undefined
  });
  return data.text || "";
}

const MONTHS = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];

// Best-effort text -> {date, time, flightNumber, confirmationCode}. Every
// field can be wrong or missing — this only suggests values for the user
// to review, it never saves anything on its own.
function parseScreenshotText(text){
  const out = { date: null, time: null, flightNumber: null, confirmationCode: null };
  if (!text) return out;

  let m = text.match(/\b(\d{4})-(\d{2})-(\d{2})\b/);
  if (m) out.date = `${m[1]}-${m[2]}-${m[3]}`;
  if (!out.date){
    m = text.match(/\b(\d{1,2})\/(\d{1,2})\/(\d{2,4})\b/);
    if (m){
      let [, mm, dd, yy] = m;
      if (yy.length === 2) yy = "20" + yy;
      out.date = `${yy}-${mm.padStart(2,"0")}-${dd.padStart(2,"0")}`;
    }
  }
  if (!out.date){
    m = text.match(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s+(\d{1,2})(?:st|nd|rd|th)?,?\s*(\d{4})?/i);
    if (m){
      const mi = MONTHS.indexOf(m[1].toLowerCase());
      const year = m[3] || new Date().getFullYear();
      out.date = `${year}-${String(mi+1).padStart(2,"0")}-${String(m[2]).padStart(2,"0")}`;
    }
  }

  m = text.match(/\b(\d{1,2}):(\d{2})\s*(AM|PM|am|pm)\b/);
  if (m){
    let h = parseInt(m[1], 10);
    const ampm = m[3].toLowerCase();
    if (ampm === "pm" && h !== 12) h += 12;
    if (ampm === "am" && h === 12) h = 0;
    out.time = `${String(h).padStart(2,"0")}:${m[2]}`;
  }

  m = text.match(/\bflight\s*#?\s*[:\-]?\s*([A-Z]{1,3}\s?\d{2,4})\b/i)
    || text.match(/\b([A-Z]{2})\s?(\d{2,4})\b/);
  if (m) out.flightNumber = (m[1] + (m[2] || "")).replace(/\s+/g, "").toUpperCase();

  m = text.match(/\b(?:confirmation|conf(?:irmation)?\.?|record locator|booking)\s*(?:code|#|no\.?)?\s*[:\-]?\s*([A-Z0-9]{5,8})\b/i);
  if (m) out.confirmationCode = m[1].toUpperCase();

  return out;
}

      </p>
      ${!isSignup ? `<p class="auth-switch"><button id="a-forgot">Forgot password?</button></p>` : ""}`;
  }

  root.innerHTML = `
    <div class="auth-wrap">
      ${body}
      ${authError ? `<p class="err">${esc(authError)}</p>` : ""}
      ${authMsg ? `<p class="msg">${esc(authMsg)}</p>` : ""}
    </div>`;

  const emailEl = document.getElementById("a-email");
  const passEl = document.getElementById("a-pass");
  const submitBtn = document.getElementById("a-submit");
  const toggleBtn = document.getElementById("a-toggle");
  const forgotBtn = document.getElementById("a-forgot");
  const backBtn = document.getElementById("a-back");

  if (toggleBtn) toggleBtn.addEventListener("click", () => {
    authMode = authMode === "signup" ? "login" : "signup";
    authError = ""; authMsg = "";
    renderAuth();
  });
  if (forgotBtn) forgotBtn.addEventListener("click", () => {
    authMode = "forgot"; authError = ""; authMsg = "";
    renderAuth();
  });
  if (backBtn) backBtn.addEventListener("click", () => {
    authMode = "login"; authError = ""; authMsg = "";
    renderAuth();
  });

  submitBtn.addEventListener("click", async () => {
    authError = ""; authMsg = "";
    try {
      if (authMode === "signup"){
        const { error } = await supabase.auth.signUp({
          email: emailEl.value.trim(), password: passEl.value,
          options: { emailRedirectTo: window.location.href }
        });
        if (error) throw error;
        authMsg = "Check your email to confirm your account, then log in.";
        authMode = "login";
      } else if (authMode === "login"){
        const { error } = await supabase.auth.signInWithPassword({
          email: emailEl.value.trim(), password: passEl.value
        });
        if (error) throw error;
      } else if (authMode === "forgot"){
        const { error } = await supabase.auth.resetPasswordForEmail(emailEl.value.trim(), {
          redirectTo: window.location.href
        });
        if (error) throw error;
        authMsg = "Check your email for a reset link.";
      } else if (authMode === "reset"){
        const newPassEl = document.getElementById("a-newpass");
        const { error } = await supabase.auth.updateUser({ password: newPassEl.value });
        if (error) throw error;
        authMsg = "Password updated. You're logged in.";
        authMode = "login";
      }
    } catch (e){
      authError = e.message || String(e);
    }
    renderAuth();
  });
}

async function loadTrips(){
  const { data, error } = await supabase
    .from("trips")
    .select("*, flights(*, price_logs(*), attachments(*)), rentals(*, attachments(*)), trip_collaborators(*)")
    .order("created_at", { ascending: true });
  if (error) { console.error(error); return []; }
  for (const t of data){
    (t.flights || []).sort((a,b) => a.position - b.position);
    (t.rentals || []).sort((a,b) => a.position - b.position);
    for (const f of t.flights || []) (f.price_logs || []).sort((a,b) => b.date.localeCompare(a.date));
  }
  return data;
}

  return data;

async function reorderItem(table, item, siblings, targetIndex){
  // siblings: array of rows (excluding `item`) in the same list, sorted by position
  let before = siblings[targetIndex - 1];
  let after = siblings[targetIndex];
  let newPos;
  if (!before && !after) newPos = 0;
  else if (!before) newPos = after.position - 1000;
  else if (!after) newPos = before.position + 1000;
  else {
    newPos = (before.position + after.position) / 2;
    if (after.position - before.position < 1e-6){
      // renumber this list, then bail (positions are now clean)
      const all = [...siblings];
      all.splice(targetIndex, 0, item);
      for (let i = 0; i < all.length; i++){
        await supabase.from(table).update({ position: i * 1000 }).eq("id", all[i].id);
      }
      return;
    }
  }
  const { error } = await supabase.from(table).update({ position: newPos }).eq("id", item.id);
  if (error) alert(error.message);
}

// Bulk-create trips (with nested flights/price_logs) from a plain JS array
// shaped like `trips` rows with `.flights[].price_logs[]` attached. Used by
// both the one-time localStorage migration and JSON "Import" (new trips).
async function bulkCreateTrips(tripBlobs){
  const tripRows = [], flightRows = [], logRows = [], rentalRows = [];
  for (const t of tripBlobs){
    const tripId = uid();
    tripRows.push({
      id: tripId, owner_id: session.user.id, title: t.title || "Imported trip",
      travel_start: t.travel_start || null, travel_end: t.travel_end || null,
      notes: t.notes || null, attendees: t.attendees || []
    });
    const byLeg = {};
    for (const f of (t.flights || [])){
      const legKey = f.leg || "_";
      byLeg[legKey] = (byLeg[legKey] || 0);
      const flightId = uid();
      flightRows.push({
        id: flightId, trip_id: tripId, label: f.label, leg: f.leg || null,
        url: f.url, currency: f.currency || "USD",
        origin: f.origin || null, destination: f.destination || null,
        depart_date: f.depart_date || null, depart_time: f.depart_time || null,
        return_date: f.return_date || null, return_time: f.return_time || null,
        paid_cash: f.paidCash ?? f.paid_cash ?? null,
        paid_points: f.paidPoints ?? f.paid_points ?? null,
        passengers: f.passengers || 1,
        alert_below: f.alertBelow ?? f.alert_below ?? null,
        notes: f.notes || null, position: byLeg[legKey]
      });
      byLeg[legKey] += 1000;
      for (const l of (f.priceLog || f.price_logs || [])){
        logRows.push({ id: uid(), flight_id: flightId, date: l.date, price: l.price });
      }
    }
    let rentalPos = 0;
    for (const r of (t.rentals || [])){
      rentalRows.push({
        id: uid(), trip_id: tripId, kind: r.kind || "housing", label: r.label,
        url: r.url || null, currency: r.currency || "USD",
        paid_cash: r.paidCash ?? r.paid_cash ?? null,
        paid_points: r.paidPoints ?? r.paid_points ?? null,
        rental_start: r.rental_start || null, rental_end: r.rental_end || null,
        cancel_by: r.cancel_by || null, notes: r.notes || null, position: rentalPos
      });
      rentalPos += 1000;
    }
  }
  if (tripRows.length){ const { error } = await supabase.from("trips").insert(tripRows); if (error) throw error; }
  if (flightRows.length){ const { error } = await supabase.from("flights").insert(flightRows); if (error) throw error; }
  if (logRows.length){ const { error } = await supabase.from("price_logs").insert(logRows); if (error) throw error; }
  if (rentalRows.length){ const { error } = await supabase.from("rentals").insert(rentalRows); if (error) throw error; }
}

async function importFromLocalStorage(){
  let raw;
  try { raw = JSON.parse(localStorage.getItem(OLD_LOCAL_KEY)); } catch { raw = null; }
  if (!raw || !Array.isArray(raw.groups) || !raw.groups.length){
    alert("No saved browser data found to import.");
    return;
  }
  const tripBlobs = raw.groups.map(g => ({ title: g.title, flights: g.flights || [] }));
  try {
    await bulkCreateTrips(tripBlobs);
    localStorage.setItem(MIGRATED_FLAG, "true");
    await refresh();
  } catch (e){
    alert("Import failed (nothing was marked as migrated, so it's safe to retry): " + e.message);
  }
}

function renderCard(trip, f){
  const cur = f.currency || "USD";
  const moveOptions = trips.filter(t => t.id !== trip.id)
    .map(t => `<option value="${t.id}">${esc(t.title)}</option>`).join("");
  const passengers = f.passengers || 1;

    ? `Paid <b>${paidText(f)}</b> × ${passengers} = <b>${flightTotalText(f)}</b>`
    : `Paid <b>${paidText(f)}</b>`];
  if (f.leg === "roundtrip" && f.return_date){
    const ret = [fmtShortDate(f.return_date), fmtTime(f.return_time)].filter(Boolean).join(" ");
    metaBits.push(`Return <b>${esc(ret)}</b>`);
  }
  if (f.flight_number) metaBits.push(`Flight <b>${esc(f.flight_number)}</b>`);
  if (f.confirmation_code) metaBits.push(`Conf. <b>${esc(f.confirmation_code)}</b>`);
  if (f.alert_below != null) metaBits.push(`Alert below <b>${fmtCash(f.alert_below, cur)}</b>`);

  const entries = f.price_logs || [];
  let histHTML;
  if (!entries.length){
    histHTML = `<p class="empty-hist">No checks logged yet.</p>`;
  } else {
    const rows = entries.map((e) => {
      let deltaHTML = '<span class="flat">·</span>';
      if (f.paid_cash != null){

        deltaHTML = d === 0 ? '<span class="flat">even</span>' :
          `<span class="${d<0?'down':'up'}">${d<0?'▼':'▲'} ${fmtCash(Math.abs(d),cur)}</span>`;
      }
      let statusTxt = "", statusCls = "";
      if (f.alert_below != null && e.price <= f.alert_below){ statusTxt = "BELOW ALERT"; statusCls = "status-alert"; }
      return `<tr data-log-row="${e.id}">
        <td>${esc(e.date)}</td>

// Shared auto-title behavior for the add/edit flight forms. `sel` maps logical
// names to the form's data-attribute selectors.
function wireAutoTitle(container, sel){
  const urlEl = container.querySelector(sel.url);
  const originEl = container.querySelector(sel.origin);
  const destEl = container.querySelector(sel.dest);
  const dateEl = container.querySelector(sel.date);
  const timeEl = container.querySelector(sel.time);
  const cashEl = container.querySelector(sel.paidCash);
  const pointsEl = container.querySelector(sel.paidPoints);
  const labelEl = container.querySelector(sel.label);
  const legEl = sel.leg ? container.querySelector(sel.leg) : null;
  const returnDateEl = sel.returnDate ? container.querySelector(sel.returnDate) : null;
  const returnWrap = sel.returnWrap ? container.querySelector(sel.returnWrap) : null;

  const regen = () => {
    if (labelEl.dataset.auto === "0") return;
    const t = flightTitle(originEl.value.trim(), destEl.value.trim(),
      dateEl.value, timeEl.value,
      cashEl.value === "" ? null : parseFloat(cashEl.value),
      pointsEl.value === "" ? null : parseFloat(pointsEl.value),
      legEl ? legEl.value : null, returnDateEl ? returnDateEl.value : null);
    if (t) labelEl.value = t;
  };
  const syncReturnVisibility = () => {
    if (!returnWrap || !legEl) return;
    returnWrap.style.display = legEl.value === "roundtrip" ? "contents" : "none";
  };
  labelEl.addEventListener("input", () => { labelEl.dataset.auto = "0"; });
  [originEl, destEl, dateEl, timeEl, cashEl, pointsEl].forEach(el => el.addEventListener("input", regen));
  if (returnDateEl) returnDateEl.addEventListener("input", regen);
  if (legEl) legEl.addEventListener("change", () => { syncReturnVisibility(); regen(); });
  syncReturnVisibility();
  urlEl.addEventListener("input", () => {
    const parsed = parseFlightUrl(urlEl.value.trim());
    if (!parsed) return;
    if (parsed.origin) originEl.value = parsed.origin;
    if (parsed.destination) destEl.value = parsed.destination;
    if (parsed.departDate) dateEl.value = parsed.departDate;
    regen();
  });
}

function rentalCancelBadge(r){
  if (!r.cancel_by) return "";
  const today = new Date(); today.setHours(0,0,0,0);
  const [y,m,d] = r.cancel_by.split("-").map(Number);
  const cancelDate = new Date(y, m-1, d);
  const daysLeft = Math.round((cancelDate - today) / 86400000);
  let cls = "", txt = `Cancel by ${fmtShortDate(r.cancel_by)}`;
  if (daysLeft < 0){ txt = `Cancel window passed (${fmtShortDate(r.cancel_by)})`; }
  else if (daysLeft === 0){ txt = "LAST DAY to cancel"; cls = "status-warn"; }
  else if (daysLeft <= 7){ txt = `Cancel by ${fmtShortDate(r.cancel_by)} — ${daysLeft}d left`; cls = "status-warn"; }
  return `<span class="status ${cls}">${txt}</span>${r.reminded_at ? ` <span class="status">reminder sent</span>` : ""}`;
}

// "2026-12-04" -> "2026-12-08" inclusive day count = 5
function tripDayCount(trip){
  if (!trip.travel_start || !trip.travel_end) return 0;
  const [ys,ms,ds] = trip.travel_start.split("-").map(Number);
  const [ye,me,de] = trip.travel_end.split("-").map(Number);
  const days = Math.round((new Date(ye,me-1,de) - new Date(ys,ms-1,ds)) / 86400000) + 1;
  return days > 0 ? days : 0;
}

function renderStatsBar(){
  const scoped = trips.filter(t => {
    if (statsFilter === "all") return true;
    if (statsFilter === "ungrouped") return !t.folder_id;
    return t.folder_id === statsFilter;
  });

  let totalDays = 0, flightCash = 0, flightPoints = 0, rentalCash = 0, rentalPoints = 0;
  for (const t of scoped){
    totalDays += tripDayCount(t);
    for (const f of (t.flights || [])){
      const n = f.passengers || 1;
      flightCash += (f.paid_cash || 0) * n;
      flightPoints += (f.paid_points || 0) * n;
    }
    for (const r of (t.rentals || [])){
      rentalCash += r.paid_cash || 0;
      rentalPoints += r.paid_points || 0;
    }
  }
  const costText = (cash, points) => {
    const parts = [];
    if (cash) parts.push(fmtCash(cash));
    if (points) parts.push(fmtPoints(points));
    return parts.length ? parts.join(" + ") : "—";
  };

  const sortedFolders = [...folders].sort((a,b) => a.position - b.position);
  const optionsHTML = `
    <option value="all" ${statsFilter==="all"?"selected":""}>All trips</option>
    ${sortedFolders.map(f => `<option value="${f.id}" ${statsFilter===f.id?"selected":""}>${esc(f.title)}</option>`).join("")}
    <option value="ungrouped" ${statsFilter==="ungrouped"?"selected":""}>Ungrouped</option>`;

  return `
    <div class="stats-bar">
      <div class="stat"><span class="stat-label">Trip days</span><span class="stat-val">${totalDays}</span></div>
      <div class="stat"><span class="stat-label">Flights</span><span class="stat-val">${costText(flightCash, flightPoints)}</span></div>
      <div class="stat"><span class="stat-label">Rentals</span><span class="stat-val">${costText(rentalCash, rentalPoints)}</span></div>
      <div class="stat stat-total"><span class="stat-label">Total cost</span><span class="stat-val">${costText(flightCash+rentalCash, flightPoints+rentalPoints)}</span></div>
      <div class="stat stat-filter">
        <span class="stat-label">Showing</span>
        <select id="statsFilterSelect">${optionsHTML}</select>
      </div>
    </div>`;
}

    const tripsInFolder = (byFolder.get(f.id) || []).sort((a,b) => a.position - b.position);
    return `<div class="tab-folder" draggable="true" data-drag-folder="${f.id}" data-folder-drop="${f.id}">
      <span class="tab-folder-label" data-folder-rename="${f.id}" title="Drag to reorder, click to rename">📁 ${esc(f.title)}</span>
      <span class="tab-folder-del" data-folder-del="${f.id}" title="Delete folder">×</span>
      <span class="tab-folder-tabs">${tripsInFolder.map(tabBtn).join("")}</span>
    </div>`;
  }).join("");

  const sortedUngrouped = ungrouped.sort((a,b) => a.position - b.position);

  return `
    <div class="tabs">
      ${folderHTML}
      <div class="tab-ungrouped" data-folder-drop="">${sortedUngrouped.map(tabBtn).join("")}</div>
      <button class="tab tab-new" id="newTripTab" title="New trip">+</button>
      <button class="tab tab-new-folder" id="newFolderTab" title="New folder">+ folder</button>
    </div>`;
}

function render(){
  if (!session){ renderAuth(); return; }

  document.getElementById("subtext").textContent =
    "Sites like Southwest block automated price lookups, so check prices yourself and log what you see.";

  const activeTrip = trips.find(t => t.id === activeTripId);
  const showImport = !!localStorage.getItem(OLD_LOCAL_KEY) && !localStorage.getItem(MIGRATED_FLAG);

  root.innerHTML = `
    <div class="toolbar">
      <span style="color:var(--muted);font-size:13px">${esc(session.user.email)}</span>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Log out</button>
      <div class="spacer"></div>
      ${showImport ? `<button class="btn btn-ghost" id="importLocalBtn">Import from this browser's saved data</button>` : ""}
      <button class="btn btn-ghost" id="exportBtn">Export all</button>
      <button class="btn btn-ghost" id="importBtn">Import JSON</button>
      <input type="file" id="importFile" accept="application/json" hidden>
    </div>

    ${renderStatsBar()}

    ${renderTabs()}

    ${activeTrip ? renderTripPanel(activeTrip) :
      `<div class="empty-state">No trips yet. Click "+" to add your first one, or import saved data above.</div>`}
  `;

  document.getElementById("statsFilterSelect").addEventListener("change", (e) => {
    statsFilter = e.target.value;
    render();
  });

  wireEvents(activeTrip);
  wireTabDragEvents();
  wireAttachments();
}

function wireEvents(activeTrip){
  document.getElementById("logoutBtn").onclick = async () => { await supabase.auth.signOut(); };

  const importLocalBtn = document.getElementById("importLocalBtn");
  if (importLocalBtn) importLocalBtn.onclick = importFromLocalStorage;

  document.getElementById("exportBtn").onclick = () => {
    const blob = new Blob([JSON.stringify({ groups: trips.map(t => ({
      title: t.title, travel_start: t.travel_start, travel_end: t.travel_end,
      notes: t.notes, attendees: t.attendees,
      flights: (t.flights||[]).map(f => ({
        label: f.label, leg: f.leg, url: f.url, currency: f.currency,
        origin: f.origin, destination: f.destination,
        depart_date: f.depart_date, depart_time: f.depart_time,
        return_date: f.return_date, return_time: f.return_time,
        paidCash: f.paid_cash, paidPoints: f.paid_points, passengers: f.passengers,
        alertBelow: f.alert_below,
        notes: f.notes, priceLog: (f.price_logs||[]).map(l => ({date: l.date, price: l.price}))
      })),
      rentals: (t.rentals||[]).map(r => ({
        kind: r.kind, label: r.label, url: r.url, currency: r.currency,
        paidCash: r.paid_cash, paidPoints: r.paid_points,
        rental_start: r.rental_start, rental_end: r.rental_end,
        cancel_by: r.cancel_by, notes: r.notes
      }))
    })) }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `flight-tracker-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
  };

  document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
  document.getElementById("importFile").onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      let parsed;
      try { parsed = JSON.parse(reader.result); }
      catch { alert("That file isn't valid JSON."); return; }
      if (!parsed || !Array.isArray(parsed.groups)) { alert("That file doesn't look like a flight-tracker backup."); return; }
      if (!confirm(`Import ${parsed.groups.length} trip(s) from this file as new trip(s)?`)) return;
      try { await bulkCreateTrips(parsed.groups); await refresh(); }
      catch (err){ alert("Import failed: " + err.message); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  document.querySelectorAll("[data-tab]").forEach(btn => {
    btn.addEventListener("click", () => { activeTripId = btn.dataset.tab; render(); });
  });

  document.getElementById("newTripTab").onclick = async () => {
    const title = prompt("Trip title (e.g. Denver Trip):");
    if (!title || !title.trim()) return;
    const t = await createTrip({ title: title.trim() });
    if (t) { activeTripId = t.id; }
    await refresh();
  };

  document.getElementById("newFolderTab").onclick = async () => {
    const title = prompt("Folder name (e.g. Work trips):");
    if (!title || !title.trim()) return;
    await createFolder(title.trim());
    await refresh();
  };

  document.querySelectorAll("[data-folder-rename]").forEach(el => {
    el.addEventListener("click", async () => {
      const id = el.dataset.folderRename;
      const folder = folders.find(f => f.id === id);
      const title = prompt("Rename folder:", folder?.title || "");
      if (!title || !title.trim() || title.trim() === folder?.title) return;
      await renameFolder(id, title.trim());
      await refresh();
    });
  });

  document.querySelectorAll("[data-folder-del]").forEach(el => {
    el.addEventListener("click", async () => {
      const id = el.dataset.folderDel;
      const folder = folders.find(f => f.id === id);
      if (!confirm(`Delete folder "${folder?.title}"? Trips inside it are kept, just ungrouped.`)) return;
      await deleteFolder(id);
      await refresh();
    });

  if (!activeTrip) return;

  document.querySelector(`[data-rename-trip="${activeTrip.id}"]`).addEventListener("click", () => {

    const input = document.createElement("input");
    input.type = "text"; input.className = "title-input"; input.value = activeTrip.title;
    h2.replaceWith(input);
    input.focus(); input.select();
    const commit = async () => {
      const val = input.value.trim();
      if (val && val !== activeTrip.title) await updateTrip(activeTrip.id, { title: val });
      await refresh();
    };
    input.addEventListener("keydown", e => { if (e.key === "Enter") commit(); if (e.key === "Escape") render(); });
    input.addEventListener("blur", commit);
  });

  document.querySelector(`[data-del-trip="${activeTrip.id}"]`).addEventListener("click", async () => {
    if (!confirm(`Delete trip "${activeTrip.title}" and all its flights?`)) return;
    await deleteTrip(activeTrip.id);
    activeTripId = null;
    await refresh();
  });

  document.querySelector(`[data-search-trip="${activeTrip.id}"]`).addEventListener("click", () => {
    (activeTrip.flights || []).forEach(f => f.url && window.open(f.url, "_blank"));
    (activeTrip.rentals || []).forEach(r => r.url && window.open(r.url, "_blank"));

  document.querySelector(`[data-edit-meta="${activeTrip.id}"]`).addEventListener("click", () => {
    const holder = document.querySelector(`[data-meta-form="${activeTrip.id}"]`);

    wireDateRangeButtons();
    const saveBtn = document.querySelector(`[data-meta-save="${activeTrip.id}"]`);

    saveBtn.addEventListener("click", async () => {
      const start = holder.querySelector(`[data-m-start]`).value || null;
      const end = holder.querySelector(`[data-m-end]`).value || null;
      const attendeesRaw = holder.querySelector(`[data-m-attendees]`).value;
      const attendees = attendeesRaw.split(",").map(s=>s.trim()).filter(Boolean);
      const notes = holder.querySelector(`[data-m-notes]`).value.trim();
      await updateTrip(activeTrip.id, { travel_start: start, travel_end: end, attendees, notes });
      let folderSel = holder.querySelector(`[data-m-folder]`).value;
      if (folderSel === "__new__"){
        const title = prompt("Folder name (e.g. Work trips):");
        if (title && title.trim()){
          const f = await createFolder(title.trim());
          folderSel = f?.id || "";
        } else folderSel = activeTrip.folder_id || "";
      }
      if ((folderSel || null) !== (activeTrip.folder_id || null)){
        await moveTripToFolder(activeTrip.id, folderSel || null);
      }
      await refresh();
    });
    document.querySelector(`[data-meta-cancel="${activeTrip.id}"]`)?.addEventListener("click", render);
  });

  const inviteBtn = document.querySelector(`[data-invite-save="${activeTrip.id}"]`);

    const input = document.querySelector(`[data-invite-email="${activeTrip.id}"]`);

    await refresh();

    const holder = document.querySelector(`[data-add-flight-form="${activeTrip.id}"]`);

    wireAddFlightForm(activeTrip.id);
  });

  document.querySelector(`[data-add-rental-toggle="${activeTrip.id}"]`).addEventListener("click", () => {
    const holder = document.querySelector(`[data-add-rental-form="${activeTrip.id}"]`);
    if (holder.innerHTML){ holder.innerHTML = ""; return; }
    holder.innerHTML = rentalFormHTML("nr", "", {
      rentalStart: activeTrip.travel_start, rentalEnd: activeTrip.travel_end
    });
    wireDateRangeButtons();
    holder.querySelector("[data-nr-cancel]").addEventListener("click", () => { holder.innerHTML = ""; });
    holder.querySelector("[data-nr-save]").addEventListener("click", async () => {
      const label = holder.querySelector("[data-nr-label]").value.trim();
      if (!label){ alert("Name is required."); return; }
      const pc = holder.querySelector("[data-nr-paidcash]").value;
      const pp = holder.querySelector("[data-nr-paidpoints]").value;
      await createRental(activeTrip.id, {
        kind: holder.querySelector("[data-nr-kind]").value,
        label, url: holder.querySelector("[data-nr-url]").value.trim(),
        rentalStart: holder.querySelector("[data-nr-start]").value || null,
        rentalEnd: holder.querySelector("[data-nr-end]").value || null,
        cancelBy: holder.querySelector("[data-nr-cancelby]").value || null,
        confirmationCode: holder.querySelector("[data-nr-confirmation]").value.trim() || null,

        notes: holder.querySelector("[data-nr-notes]").value.trim(),
      });
      await refresh();

  document.querySelectorAll("[data-edit-rental]").forEach(btn => {
    btn.addEventListener("click", () => {
      const rid = btn.dataset.editRental;
      const { rental } = findRental(rid);
      const card = document.querySelector(`[data-rental-card="${rid}"]`);
      const wrap = document.createElement("div");
      wrap.innerHTML = rentalFormHTML("er", `data-rental-edit-form="${rid}"`);
      card.replaceWith(wrap.firstElementChild);

      const form = document.querySelector(`[data-rental-edit-form="${rid}"]`);

      form.querySelector("[data-er-label]").value = rental.label || "";
      form.querySelector("[data-er-url]").value = rental.url || "";
      form.querySelector("[data-er-start]").value = rental.rental_start || "";
      form.querySelector("[data-er-end]").value = rental.rental_end || "";
      form.querySelector("[data-er-cancelby]").value = rental.cancel_by || "";
      form.querySelector("[data-er-confirmation]").value = rental.confirmation_code || "";
      form.querySelector("[data-er-paidcash]").value = rental.paid_cash ?? "";
      form.querySelector("[data-er-paidpoints]").value = rental.paid_points ?? "";
      form.querySelector("[data-er-notes]").value = rental.notes || "";
      form.querySelector("[data-er-cancel]").addEventListener("click", render);
      form.querySelector("[data-er-save]").addEventListener("click", async () => {
        const pc = form.querySelector("[data-er-paidcash]").value;
        const pp = form.querySelector("[data-er-paidpoints]").value;
        const newCancelBy = form.querySelector("[data-er-cancelby]").value || null;
        const patch = {
          kind: form.querySelector("[data-er-kind]").value,
          label: form.querySelector("[data-er-label]").value.trim() || rental.label,
          url: form.querySelector("[data-er-url]").value.trim() || null,
          rental_start: form.querySelector("[data-er-start]").value || null,
          rental_end: form.querySelector("[data-er-end]").value || null,
          cancel_by: newCancelBy,
          confirmation_code: form.querySelector("[data-er-confirmation]").value.trim() || null,
          paid_cash: pc === "" ? null : parseFloat(pc),
          paid_points: pp === "" ? null : parseFloat(pp),
          notes: form.querySelector("[data-er-notes]").value.trim() || null,
        };
        // A changed deadline should get a fresh reminder email.
        if (newCancelBy !== rental.cancel_by) patch.reminded_at = null;
        await updateRental(rid, patch);
        await refresh();
      });
    });
  });

  document.querySelectorAll("[data-del-rental]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const rid = btn.dataset.delRental;
      const { rental } = findRental(rid);
      if (!confirm(`Delete rental "${rental.label}"?`)) return;
      await deleteRental(rid);
      await refresh();
    });

  document.querySelectorAll("[data-edit-flight]").forEach(btn => {
    btn.addEventListener("click", () => {
      const fid = btn.dataset.editFlight;
      const { flight } = findFlight(fid);
      const card = document.querySelector(`[data-card="${fid}"]`);
      const wrap = document.createElement("div");
      wrap.innerHTML = renderEditForm(flight);
      card.replaceWith(wrap.firstElementChild);
      wireDateRangeButtons();
      const form = document.querySelector(`[data-edit-form="${fid}"]`);
      form.querySelector("[data-f-label]").value = flight.label || "";
      form.querySelector("[data-f-leg]").value = flight.leg || "";
      form.querySelector("[data-f-currency]").value = flight.currency || "USD";
      form.querySelector("[data-f-url]").value = flight.url || "";
      form.querySelector("[data-f-origin]").value = flight.origin || "";
      form.querySelector("[data-f-dest]").value = flight.destination || "";
      form.querySelector("[data-f-date]").value = flight.depart_date || "";
      form.querySelector("[data-f-time]").value = (flight.depart_time || "").slice(0,5);

      form.querySelector("[data-f-paidpoints]").value = flight.paid_points ?? "";
      form.querySelector("[data-f-alert]").value = flight.alert_below ?? "";
      form.querySelector("[data-f-notes]").value = flight.notes || "";
      // Only keep auto-regenerating if the current label matches what we'd generate.
      const labelEl = form.querySelector("[data-f-label]");
      labelEl.dataset.auto =
        (!flight.label || flight.label === flightTitle(flight.origin, flight.destination,
          flight.depart_date, (flight.depart_time || "").slice(0,5),
          flight.paid_cash, flight.paid_points, flight.leg, flight.return_date)) ? "1" : "0";
      wireAutoTitle(form, { url: "[data-f-url]", origin: "[data-f-origin]",

        paidCash: "[data-f-paidcash]", paidPoints: "[data-f-paidpoints]",
        label: "[data-f-label]", leg: "[data-f-leg]",
        returnDate: "[data-f-return-date]", returnWrap: "[data-f-return-wrap]" });

      form.querySelector("[data-save-flight]").addEventListener("click", async () => {
        const pc = form.querySelector("[data-f-paidcash]").value;
        const pp = form.querySelector("[data-f-paidpoints]").value;
        const ab = form.querySelector("[data-f-alert]").value;
        const origin = form.querySelector("[data-f-origin]").value.trim().toUpperCase() || null;
        const destination = form.querySelector("[data-f-dest]").value.trim().toUpperCase() || null;
        const departDate = form.querySelector("[data-f-date]").value || null;
        const departTime = form.querySelector("[data-f-time]").value || null;
        const leg = form.querySelector("[data-f-leg]").value || null;
        const returnDate = leg === "roundtrip" ? (form.querySelector("[data-f-return-date]").value || null) : null;
        const returnTime = leg === "roundtrip" ? (form.querySelector("[data-f-return-time]").value || null) : null;
        const paidCash = pc === "" ? null : parseFloat(pc);
        const paidPoints = pp === "" ? null : parseFloat(pp);
        const passengers = parseInt(form.querySelector("[data-f-passengers]").value, 10) || 1;
        await updateFlight(fid, {
          label: form.querySelector("[data-f-label]").value.trim()
            || flightTitle(origin, destination, departDate, departTime, paidCash, paidPoints, leg, returnDate)
            || flight.label,
          leg,
          currency: form.querySelector("[data-f-currency]").value.trim() || "USD",
          url: form.querySelector("[data-f-url]").value.trim() || null,
          origin, destination, depart_date: departDate, depart_time: departTime,
          return_date: returnDate, return_time: returnTime,
          paid_cash: paidCash,
          paid_points: paidPoints,
          passengers,
          flight_number: form.querySelector("[data-f-flightnumber]").value.trim() || null,
          confirmation_code: form.querySelector("[data-f-confirmation]").value.trim() || null,
          alert_below: ab === "" ? null : parseFloat(ab),
          notes: form.querySelector("[data-f-notes]").value.trim(),

        await refresh();
      });
      form.querySelector("[data-cancel-flight]").addEventListener("click", render);

  document.querySelectorAll("[data-move-flight]").forEach(sel => {
    sel.addEventListener("change", async () => {

      await moveFlightToTrip(sel.dataset.moveFlight, sel.value);
      await refresh();
    });
  });

  document.querySelectorAll("[data-del-flight]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const fid = btn.dataset.delFlight;
      const { flight } = findFlight(fid);
      if (!confirm(`Delete flight "${flight.label}"?`)) return;
      await deleteFlight(fid);
      await refresh();
    });
  });

  document.querySelectorAll("[data-save-log]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const fid = btn.dataset.saveLog;
      const input = document.querySelector(`[data-log-input="${fid}"]`);
      const val = parseFloat(input.value);
      if (isNaN(val)) return;
      await addPriceLog(fid, new Date().toISOString().slice(0,10), val);
      await refresh();
    });
  });

  document.querySelectorAll("[data-edit-log]").forEach(el => {
    el.addEventListener("click", () => {
      const logId = el.dataset.editLog, fid = el.dataset.flight;
      const { flight } = findFlight(fid);
      const target = (flight.price_logs || []).find(l => l.id === logId);
      const tr = document.querySelector(`[data-log-row="${logId}"]`);
      const editTr = document.createElement("tr");
      editTr.innerHTML = `
        <td><input type="date" data-le-date></td>
        <td><input type="number" step="0.01" data-le-price style="width:90px"></td>
        <td colspan="3">
          <button class="btn-link" data-le-save>save</button>
          <button class="btn-link" data-le-cancel>cancel</button>
        </td>`;
      tr.replaceWith(editTr);
      editTr.querySelector("[data-le-date]").value = target.date;
      editTr.querySelector("[data-le-price]").value = target.price;
      editTr.querySelector("[data-le-save]").addEventListener("click", async () => {
        const newDate = editTr.querySelector("[data-le-date]").value;
        const newPrice = parseFloat(editTr.querySelector("[data-le-price]").value);
        const patch = {};
        if (newDate) patch.date = newDate;
        if (!isNaN(newPrice)) patch.price = newPrice;
        await updatePriceLog(logId, patch);
        await refresh();
      });
      editTr.querySelector("[data-le-cancel]").addEventListener("click", render);
    });
  });

  document.querySelectorAll("[data-del-log]").forEach(el => {
    el.addEventListener("click", async () => { await deletePriceLog(el.dataset.delLog); await refresh(); });
  });

  wireDragEvents(activeTrip);
}

function wireAddFlightForm(tripId){
  const holder = document.querySelector(`[data-add-flight-form="${tripId}"]`);
  const saveBtn = holder.querySelector("[data-nf-save]");
  const cancelBtn = holder.querySelector("[data-nf-cancel]");
  if (!saveBtn) return;
  wireDateRangeButtons();
  wireAutoTitle(holder, { url: "[data-nf-url]", origin: "[data-nf-origin]",
    dest: "[data-nf-dest]", date: "[data-nf-date]", time: "[data-nf-time]",
    paidCash: "[data-nf-paidcash]", paidPoints: "[data-nf-paidpoints]",
    label: "[data-nf-label]", leg: "[data-nf-leg]",
    returnDate: "[data-nf-return-date]", returnWrap: "[data-nf-return-wrap]" });
  saveBtn.addEventListener("click", async () => {
    const url = holder.querySelector("[data-nf-url]").value.trim();
    const origin = holder.querySelector("[data-nf-origin]").value.trim().toUpperCase() || null;
    const destination = holder.querySelector("[data-nf-dest]").value.trim().toUpperCase() || null;
    const departDate = holder.querySelector("[data-nf-date]").value || null;
    const departTime = holder.querySelector("[data-nf-time]").value || null;
    const leg = holder.querySelector("[data-nf-leg]").value || null;
    const returnDate = leg === "roundtrip" ? (holder.querySelector("[data-nf-return-date]").value || null) : null;
    const returnTime = leg === "roundtrip" ? (holder.querySelector("[data-nf-return-time]").value || null) : null;
    const pc = holder.querySelector("[data-nf-paidcash]").value;
    const pp = holder.querySelector("[data-nf-paidpoints]").value;
    const paidCash = pc === "" ? null : parseFloat(pc);
    const paidPoints = pp === "" ? null : parseFloat(pp);
    const passengers = parseInt(holder.querySelector("[data-nf-passengers]").value, 10) || 1;
    const label = holder.querySelector("[data-nf-label]").value.trim()
      || flightTitle(origin, destination, departDate, departTime, paidCash, paidPoints, leg, returnDate);
    if (!label) { alert("A title, or From/To airports to auto-generate one, is required."); return; }
    const currency = holder.querySelector("[data-nf-currency]").value.trim() || "USD";
    const ab = holder.querySelector("[data-nf-alert]").value;
    const notes = holder.querySelector("[data-nf-notes]").value.trim();
    await createFlight(tripId, {
      label, leg, url: url || null, currency, origin, destination, departDate, departTime,
      returnDate, returnTime, paidCash, paidPoints, passengers,
      flightNumber: holder.querySelector("[data-nf-flightnumber]").value.trim() || null,
      confirmationCode: holder.querySelector("[data-nf-confirmation]").value.trim() || null,
      alertBelow: ab === "" ? null : parseFloat(ab),
      notes
    });
    await refresh();
  });
  cancelBtn.addEventListener("click", () => { holder.innerHTML = ""; });
}

// ---------------- Attachments UI wiring ----------------

function openEditFormIfNeeded(kind, itemId){
  const formSel = kind === "flight" ? `[data-edit-form="${itemId}"]` : `[data-rental-edit-form="${itemId}"]`;
  let form = document.querySelector(formSel);
  if (!form){
    const editBtn = document.querySelector(
      kind === "flight" ? `[data-edit-flight="${itemId}"]` : `[data-edit-rental="${itemId}"]`);
    if (editBtn) editBtn.click();
    form = document.querySelector(formSel);
  }
  return form;
}

function applySuggestionToFlight(itemId, suggestion){
  const form = openEditFormIfNeeded("flight", itemId);
  if (!form) return;
  const setIfEmpty = (sel, val) => {
    const el = form.querySelector(sel);
    if (el && !el.value && val) el.value = val;
  };
  setIfEmpty("[data-f-date]", suggestion.date);
  setIfEmpty("[data-f-time]", suggestion.time);
  setIfEmpty("[data-f-flightnumber]", suggestion.flightNumber);
  setIfEmpty("[data-f-confirmation]", suggestion.confirmationCode);
}

function applySuggestionToRental(itemId, suggestion){
  const form = openEditFormIfNeeded("rental", itemId);
  if (!form) return;
  const el = form.querySelector("[data-er-confirmation]");
  if (el && !el.value && suggestion.confirmationCode) el.value = suggestion.confirmationCode;
}

function renderSuggestionBanner(kind, itemId, suggestion){
  const bits = [];
  if (suggestion.date) bits.push(`Date <b>${esc(fmtShortDate(suggestion.date))}</b>`);
  if (suggestion.time) bits.push(`Time <b>${esc(fmtTime(suggestion.time))}</b>`);
  if (kind === "flight" && suggestion.flightNumber) bits.push(`Flight <b>${esc(suggestion.flightNumber)}</b>`);
  if (suggestion.confirmationCode) bits.push(`Conf. <b>${esc(suggestion.confirmationCode)}</b>`);
  if (!bits.length) return "";
  return `
    <div class="att-suggest" data-att-suggest="${itemId}">
      <span>Detected from screenshot: ${bits.join(" &middot; ")}</span>
      <button class="btn btn-ghost btn-sm" data-att-apply="${itemId}">Apply to form</button>
      <button class="btn-link" data-att-dismiss="${itemId}">dismiss</button>
    </div>`;
}

function wireAttachments(){
  // Resolve signed URLs for every thumbnail (private bucket — no public URL).
  document.querySelectorAll("[data-att-img]").forEach(async (img) => {
    const path = img.dataset.attPath;
    const url = await attachmentSignedUrl(path);
    if (url) img.src = url;
  });

  document.querySelectorAll("[data-att-open]").forEach(img => {
    img.addEventListener("click", async () => {
      // Open the tab synchronously (still inside the click's user-gesture
      // trust window), then redirect it once the signed URL resolves —
      // opening after an `await` gets silently popup-blocked in most browsers.
      const newTab = window.open("", "_blank"); // no noopener: need the ref to redirect it below
      const attId = img.dataset.attOpen;
      const found = findAttachmentOwner(attId);
      if (!found) { newTab?.close(); return; }
      const url = await attachmentSignedUrl(found.attachment.storage_path);
      if (url && newTab) newTab.location.href = url;
      else newTab?.close();
    });
  });

  document.querySelectorAll("[data-att-view-text]").forEach(btn => {
    btn.addEventListener("click", () => {
      const attId = btn.dataset.attViewText;
      const found = findAttachmentOwner(attId);
      if (!found) return;
      const holder = document.querySelector(`[data-att-text-holder="${found.item.id}"]`);
      if (!holder) return;
      if (holder.innerHTML){ holder.innerHTML = ""; return; }
      const text = found.attachment.ocr_text;
      holder.innerHTML = `<div class="att-text-box">${esc(text || "No text extracted from this image.")}</div>`;
    });
  });

  document.querySelectorAll("[data-att-del]").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      const attId = btn.dataset.attDel;
      const found = findAttachmentOwner(attId);
      if (!found) return;
      if (!confirm("Delete this screenshot?")) return;
      await deleteAttachment(found.attachment);
      await refresh();
    });
  });

  document.querySelectorAll("[data-att-upload]").forEach(input => {
    input.addEventListener("change", async () => {
      const file = input.files[0];
      if (!file) return;
      const [kind, itemId] = input.dataset.attUpload.split(":");
      const found = kind === "flight" ? findFlight(itemId) : findRental(itemId);
      const trip = found?.trip;
      if (!trip) return;
      const statusEl = document.querySelector(`[data-att-status="${itemId}"]`);
      if (statusEl) statusEl.textContent = "Uploading…";
      const att = await uploadAttachment(trip.id, kind, itemId, file);
      if (!att) { if (statusEl) statusEl.textContent = ""; return; }
      // Refresh now so the thumbnail appears right away; OCR runs after,
      // against fresh DOM nodes (render() just replaced the old ones).
      await refresh();
      const freshStatusEl = document.querySelector(`[data-att-status="${itemId}"]`);
      if (freshStatusEl) freshStatusEl.textContent = "Scanning screenshot for text…";
      try {
        const text = await runOcr(file, (m) => {
          if (freshStatusEl && m.status === "recognizing text"){
            freshStatusEl.textContent = `Scanning… ${Math.round((m.progress||0)*100)}%`;
          }
        });
        await saveAttachmentOcrText(att.id, text);
        const owner = findAttachmentOwner(att.id);
        if (owner) owner.attachment.ocr_text = text; // keep in-memory cache in sync, no full refresh
        const suggestion = parseScreenshotText(text);
        if (freshStatusEl) freshStatusEl.textContent = "";
        const suggestHolder = document.querySelector(`[data-att-suggest-holder="${itemId}"]`);
        if (suggestHolder){
          suggestHolder.innerHTML = renderSuggestionBanner(kind, itemId, suggestion);
          const applyBtn = document.querySelector(`[data-att-apply="${itemId}"]`);
          if (applyBtn) applyBtn.addEventListener("click", () => {
            if (kind === "flight") applySuggestionToFlight(itemId, suggestion);
            else applySuggestionToRental(itemId, suggestion);
          });
          const dismissBtn = document.querySelector(`[data-att-dismiss="${itemId}"]`);
          if (dismissBtn) dismissBtn.addEventListener("click", () => { suggestHolder.innerHTML = ""; });
        }
      } catch (err){
        if (freshStatusEl) freshStatusEl.textContent = "Couldn't scan image (saved anyway): " + err.message;
      }
    });
  });
}

// ---------------- Tab / folder drag and drop ----------------

let dragTripId = null;
let dragFolderId = null;

function wireTabDragEvents(){
  document.querySelectorAll("[data-drag-tab]").forEach(tab => {
    tab.addEventListener("dragstart", (e) => {
      dragTripId = tab.dataset.dragTab;
      dragFolderId = null;
      e.stopPropagation();
      e.dataTransfer.effectAllowed = "move";
    });
    tab.addEventListener("dragover", (e) => { e.preventDefault(); e.stopPropagation(); });
    tab.addEventListener("drop", async (e) => {
      e.preventDefault(); e.stopPropagation();
      if (!dragTripId || dragTripId === tab.dataset.dragTab) return;
      const target = trips.find(t => t.id === tab.dataset.dragTab);
      const dragged = trips.find(t => t.id === dragTripId);
      const targetFolderId = target.folder_id || null;
      if ((dragged.folder_id || null) !== targetFolderId){
        await moveTripToFolder(dragTripId, targetFolderId);
      } else {
        const siblings = trips
          .filter(t => t.id !== dragTripId && (t.folder_id || null) === targetFolderId)
          .sort((a,b) => a.position - b.position);
        const targetIndex = siblings.findIndex(t => t.id === tab.dataset.dragTab);
        await reorderItem("trips", dragged, siblings, targetIndex);
      }
      dragTripId = null;
      await refresh();
    });
  });

  document.querySelectorAll("[data-folder-drop]").forEach(zone => {
    zone.addEventListener("dragover", (e) => { e.preventDefault(); zone.classList.add("drag-over"); });
    zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
    zone.addEventListener("drop", async (e) => {
      e.preventDefault();
      zone.classList.remove("drag-over");
      const folderId = zone.dataset.folderDrop || null;
      if (dragTripId){
        await moveTripToFolder(dragTripId, folderId);
        dragTripId = null;
        await refresh();
      } else if (dragFolderId && folderId && dragFolderId !== folderId){
        const dragged = folders.find(f => f.id === dragFolderId);
        const siblings = folders.filter(f => f.id !== dragFolderId).sort((a,b) => a.position - b.position);
        const targetIndex = siblings.findIndex(f => f.id === folderId);
        await reorderItem("trip_folders", dragged, siblings, targetIndex);
        dragFolderId = null;
        await refresh();
      }
    });
  });

  document.querySelectorAll("[data-drag-folder]").forEach(handle => {
    handle.addEventListener("dragstart", (e) => {
      dragFolderId = handle.dataset.dragFolder;
      dragTripId = null;
      e.dataTransfer.effectAllowed = "move";
    });
  });
}

// ---------------- Drag and drop ----------------

let dragFlightId = null;
let dragRentalId = null;

function wireDragEvents(activeTrip){
  document.querySelectorAll("[data-drag-handle]").forEach(handle => {
    handle.addEventListener("dragstart", (e) => {
      dragFlightId = handle.dataset.dragHandle;
      dragRentalId = null;
      e.dataTransfer.effectAllowed = "move";
    });
  });
  document.querySelectorAll("[data-rental-drag]").forEach(handle => {
    handle.addEventListener("dragstart", (e) => {
      dragRentalId = handle.dataset.rentalDrag;
      dragFlightId = null;
      e.dataTransfer.effectAllowed = "move";
    });
  });

  document.querySelectorAll("[data-card]").forEach(card => {
    card.addEventListener("dragover", (e) => { e.preventDefault(); card.classList.add("drag-over"); });
    card.addEventListener("dragleave", () => card.classList.remove("drag-over"));
    card.addEventListener("drop", async (e) => {
      e.preventDefault();
      card.classList.remove("drag-over");
      if (!dragFlightId || dragFlightId === card.dataset.card) return;
      const targetLeg = card.dataset.leg;
      const { flight: dragged } = findFlight(dragFlightId);
      if (legScope(dragged.leg) !== targetLeg) return; // no cross-lane drag for now
      const siblings = (activeTrip.flights || [])
        .filter(f => f.id !== dragFlightId && legScope(f.leg) === targetLeg)
        .sort((a,b) => a.position - b.position);
      const targetIndex = siblings.findIndex(f => f.id === card.dataset.card);
      await reorderItem("flights", dragged, siblings, targetIndex);
      await refresh();
    });
  });

  document.querySelectorAll("[data-leg-list]").forEach(list => {
    list.addEventListener("dragover", (e) => e.preventDefault());
    list.addEventListener("drop", async (e) => {
      if (e.target !== list) return; // let card-level drop handlers take it
      e.preventDefault();
      if (!dragFlightId) return;
      const targetLeg = list.dataset.legList;
      const { flight: dragged } = findFlight(dragFlightId);
      if (legScope(dragged.leg) !== targetLeg) return;
      const siblings = (activeTrip.flights || [])
        .filter(f => f.id !== dragFlightId && legScope(f.leg) === targetLeg)
        .sort((a,b) => a.position - b.position);
      await reorderItem("flights", dragged, siblings, siblings.length);
      await refresh();
    });
  });

  document.querySelectorAll("[data-rental-card]").forEach(card => {
    card.addEventListener("dragover", (e) => { e.preventDefault(); card.classList.add("drag-over"); });
    card.addEventListener("dragleave", () => card.classList.remove("drag-over"));
    card.addEventListener("drop", async (e) => {
      e.preventDefault();
      card.classList.remove("drag-over");
      if (!dragRentalId || dragRentalId === card.dataset.rentalCard) return;
      const { rental: dragged } = findRental(dragRentalId);
      const siblings = (activeTrip.rentals || [])
        .filter(r => r.id !== dragRentalId)
        .sort((a,b) => a.position - b.position);
      const targetIndex = siblings.findIndex(r => r.id === card.dataset.rentalCard);
      await reorderItem("rentals", dragged, siblings, targetIndex);
      await refresh();
    });
  });
}

// ---------------- Init ----------------

supabase.auth.onAuthStateChange((event, newSession) => {
  if (event === "PASSWORD_RECOVERY"){ authMode = "reset"; render(); return; }
  session = newSession;
  if (session) refresh(); else render();
});

const { data: { session: initSession } } = await supabase.auth.getSession();
session = initSession;
if (session) refresh(); else render();
